version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci || npm install
    build:
      commands:
        # Amplify only exposes env vars to the build by default; .env.production
        # makes these available to the SSR compute at runtime too. NEXT_PUBLIC_*
        # vars don't need this — Next.js already inlines them into the client
        # bundle during the build phase, where Amplify's env vars are visible.
        - env | grep -e ANTHROPIC_API_KEY -e FIREBASE_SERVICE_ACCOUNT_BASE64 >> .env.production || true
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
