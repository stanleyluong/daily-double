version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci || npm install
    build:
      commands:
        # Amplify only exposes env vars to the build by default; .env.production
        # makes ANTHROPIC_API_KEY available to the SSR compute at runtime.
        - env | grep -e ANTHROPIC_API_KEY >> .env.production || true
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
